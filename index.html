<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Lord apply </title>
</head>
<body>
    <header>
        <h1>Team Lord apply form</h1>
    </header>
    <main>
        <form action="submit" method="post">
            <label for="Legend name ">Legend name:</label>
            <input type="text" id="Legend name" name="Legend name" required><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required><br><br>
            <label for="country">Country:</label>
            <input type="text" id="country" name="country" required><br><br>
            <label>Skills:</label><br>
            <input type="checkbox" name="skills" value="coding"> Coding <br>
            <input type="checkbox" name="skills" value="art"> Art <br>
            <input type="checkbox" name="skills" value="gaming"> Gaming <br><br>
            <label for="rank">Rank:</label><br>
            <input type="checkbox" id="rank" name="rank" value="Bronze"> Bronze <br>
            <input type="checkbox" id="rank" name="rank" value="Silver"> Silver <br>
            <input type="checkbox" id="rank" name="rank" value="Gold"> Gold <br>
            <input type="checkbox" id="rank" name="rank" value="Platinum"> Platinum <br>
            <input type="checkbox" id="rank" name="rank" value="Diamond">   Diamond <br><br>
            <label for="playtime">Playtime (hours):</label>
            <input type="number" id="playtime" name="playtime" required><br><br>
            <label for="experience">Experience:</label>
            <input type="text" id="experience" name="experience" required><br><br>
            <input type="submit" value="Submit">
            <label for="reset">Reset:</label>
            <input type="reset" id="reset" name="reset">
        </form>
        
    </main>
    <footer>
        <p>&copy; 2024 Team Lord. All rights reserved.</p>
    </footer>
</body>
</html>
